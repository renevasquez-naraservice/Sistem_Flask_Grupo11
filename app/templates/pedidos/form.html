{% extends "base.html" %}

{% block title %}
    {% if pedido %}Editar Pedido{% else %}Nuevo Pedido{% endif %} - Plantilla Flask
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="fw-bold mb-4">
                {% if pedido %}Editar Pedido{% else %}Nuevo Pedido{% endif %}
            </h1>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="estado" class="form-label fw-semibold">Estado</label>
                            <input
                                type="text"
                                class="form-control"
                                id="estado"
                                name="estado"
                                value="{{ pedido.estado if pedido else '' }}"
                                placeholder="Ej: pendiente"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="total" class="form-label fw-semibold">Total</label>
                            <input
                                type="number"
                                step="0.01"
                                class="form-control"
                                id="total"
                                name="total"
                                value="{{ pedido.total if pedido else '' }}"
                                placeholder="Ej: 25.00"
                                required
                            >
                        </div>

                        <div class="mb-4">
                            <label for="notas" class="form-label fw-semibold">Notas</label>
                            <textarea
                                class="form-control"
                                id="notas"
                                name="notas"
                                rows="3"
                                placeholder="Observaciones del pedido"
                            >{{ pedido.notas if pedido else '' }}</textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                {% if pedido %}Guardar Cambios{% else %}Crear Pedido{% endif %}
                            </button>

                            <a href="{{ url_for('pedidos.lista') }}" class="btn btn-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
